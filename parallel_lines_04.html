<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parallel Lines Theorems</title>

  <!-- ✅ CSS Files -->
  <link rel="stylesheet" href="./css/header_styles.css" />
  <link rel="stylesheet" href="./css/style.css" />

  <!-- ✅ JS Modules -->

  <script type="module" src="./shapes/CanvasManager.js"> </script>
  <script type="module" src="./js/responsiveCanvas.js"> </script>
  <script type="module" src="./shapes.js"></script>
  <script type="module" src="./js/debugDivSizes.js"> </script>


  <script type="module">
    import { sumMeasures,compareMeasures, compareDividedMeasures, calculateRatio, updateMessage, calculateSin, calculateCos, calculateTrig, decimalToFraction, calcTrig} from './js/parallelLinesPage.js';

    // Expose functions globally
    window.sumMeasures = sumMeasures;
    window.compareMeasures = compareMeasures;
    window.updateMessage = updateMessage;
    window.calculateSin = calculateSin;
    window.calculateCos = calculateCos;
    window.calculateTrig = calculateTrig;
    window.calcTrig = calcTrig;
    window.decimalToFraction = decimalToFraction;
    </script>

    <style>
  .canvas-wrapper { position: relative; }
  #additional-div {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 1000;
    background: #fff;
    padding: 6px;
    border: 1px solid #ccc;
  }
</style>

</head>

<body>
  <!-- ✅ Header Placeholder -->
  <div id="header-placeholder"></div>

  <!-- ✅ Main Layout Container -->
  <div class="container">
  
    <!-- 🔹 Left Sidebar with Instructions -->
    <div class="sidebar-container">
   
      <div id="theorem-definition">
        <p id="theorem-text">Definition text...</p>
      </div>
  <div class="sidebar left" id="left-sidebar">

     
      <h3>Instructions</h3>
      <p>Select a theorem from the navigation bar above to see its instructions here.</p>
    </div>
  </div>

    <!-- 🔹 Canvas Area -->
    <div class="canvas-container">
      <div class="size-label"></div>
      <!-- Sub-buttons (SVG) -->
      

      <div class="canvas-wrapper">
        <div id="dynamic-buttons" class="triangle-buttons"></div>
        <div class="size-label"></div>
        <!-- Tool Buttons -->
        <div id="additional-div" class="additional-div">

          <button id="draw-line" class="icon-btn" title="Draw Line">
            <img src="./icons/line-icon.png" alt="Line Icon" />
          </button>
          
          
          <button id="draw-protractor" class="icon-btn" title="Draw Protractor">
            <img src="./icons/protractor-icon.png" alt="Protractor Icon" />
          </button>
          <button id="modify-shape" class="icon-btn" title="Modify Shape">
            <img src="./icons/modify-icon.png" alt="Modify Icon" />
          </button>
          <button id="delete-shape" class="icon-btn" title="Delete Shape">
            <img src="./icons/delete-icon.png" alt="Delete Icon" />
          </button>
          <button id="add-divider" class="icon-btn" title="Add Divider">
            <img src="./icons/divider-icon.png" alt="Divider Icon" />
          </button>
        </div>

        <!-- Canvas Element -->
        <div class="canvas-scroll-container" style="position: relative;">
          <canvas id="canvas"></canvas>
          <div id="canvas-overlay" style="position: absolute; top: 0; left: 0; pointer-events: none;"></div>
        </div>

      </div>
    </div>

    <!-- 🔹 Right Sidebar for Results -->
    <div class="sidebar right" id="right-sidebar">
   
      <h3>Verification - Vertically Opposite Angles</h3>
    </div>

  </div>

  <!-- ✅ Load Header and Initialize Logic -->
  <script type="module">
    const html = await fetch('./header.html').then(res => res.text());
    document.getElementById('header-placeholder').innerHTML = html;

    const { updatePageTitle,loadSubHeaderIcons } = await import('./js/header.js');
    updatePageTitle();
    loadSubHeaderIcons();

    const {attachNavBarListeners } = await import('./js/header.js');
    const { switchFunctionality } = await import('./js/parallelLinesEventHandlers.js');
    attachNavBarListeners();
    switchFunctionality('verticallyOpposite'); // Default functionality
  </script>
</body>
</html>
