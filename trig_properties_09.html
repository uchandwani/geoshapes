<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Triangle Properties</title>
    <link rel="stylesheet" href="./css/header_styles.css">
    <link rel="stylesheet" href="./css/style.css">
    <script type="module" src="./js/trianglePropertiesPage.js"></script>
    <script type="module" src="./js/responsiveCanvas.js"> </script>
     <script type="module">
    import { calculateSin, calculateCos, calculateTrig, decimalToFraction, calcTrig} from './js/trianglePropertiesPage.js';

    // Expose functions globally
   
    window.calculateSin = calculateSin;
    window.calculateCos = calculateCos;
    window.calculateTrig = calculateTrig;
    window.calcTrig = calcTrig;
    window.decimalToFraction = decimalToFraction;
    </script>
</head>

<body>
<div id="header-placeholder"></div>

    
    <!-- Theorem Definition Section -->
    
    <div class="container">
        <!-- Left Sidebar -->
        <div class="sidebar left" id="left-sidebar">
            <h3>Instructions</h3>
            <p>Select a theorem from the navigation bar above to see its instructions here.</p>
        </div>
            

        <!-- Main Canvas -->
        <div class="canvas-container">
            <div class="navigation-buttons">
          
                
                <button id="sineTheta-button" class="icon-btn" title="Sin Theta Angle">Sin Theta</button>
                <button id="cosineTheta-button" class="icon-btn" title="Cos Theta Angle">Cos Theta</button>
                <button id="trigonoRatios-button" class="icon-btn" title="Trigonometric Ratios">Trigonometric ratios</button>
                <button id="trigonoIdentities-button" class="icon-btn" title="Verify Trignometric Identities ">Verifty Trignometric Identitites</button>
                        
                </div>
            <div id="theorem-definition" class="theorem-definition">
             <p id="theorem-text">Definition of the currently selected theorem will appear here.</p>
             </div> 

             <div id="dynamic-buttons" class="triangle-buttons">
    <button id="tab-verify" onclick="showTab('other')">Verify Trigonometric Identities</button>
    <button id="tab-other" onclick="showTab('other')">Other Tab</button>
   </div>

             <!--div id="dynamic-buttons" class="triangle-buttons"></div-->
                     <div class="canvas-wrapper">
                        <div id="left-side-tool-div">
                            <button id="draw-line" class="icon-btn" title="Draw Line">
                              <!-- Line Icon -->
                              <svg width="24" height="24" viewBox="0 0 24 24">
                                <line x1="4" y1="20" x2="20" y2="4" stroke="#1E88E5" stroke-width="2"/>
                              </svg>
                            </button>
                          
                            <button id="draw-protractor" class="icon-btn" title="Draw Protractor">
                              <!-- Protractor Icon -->
                              <svg width="24" height="24" viewBox="0 0 24 24">
                                <path d="M12 3a9 9 0 0 0-9 9v3h18v-3a9 9 0 0 0-9-9zM5 12a7 7 0 0 1 14 0v1H5v-1z" fill="#000"/>
                              </svg>
                            </button>
                          
                            
                          
                            <button id="delete-shape" class="icon-btn" title="Delete Shape">
                              <!-- Trash Icon -->
                              <svg width="24" height="24" viewBox="0 0 24 24">
                                <rect x="5" y="7" width="14" height="14" rx="2" fill="none" stroke="#1E88E5" stroke-width="2"/>
                                <line x1="3" y1="7" x2="21" y2="7" stroke="#1E88E5" stroke-width="2"/>
                                <line x1="10" y1="11" x2="10" y2="17" stroke="#1E88E5" stroke-width="2"/>
                                <line x1="14" y1="11" x2="14" y2="17" stroke="#1E88E5" stroke-width="2"/>
                              </svg>
                            </button>
                  
                            <button id="add-divider" class="icon-btn" title="Add Divider">
                              <!-- Divider Icon (Compass) -->
                              <svg width="24" height="24" viewBox="0 0 24 24">
                                <circle cx="12" cy="4" r="2" fill="#000"/>
                                <path d="M12 6v5m0 0l-4 11m4-11l4 11" stroke="#1E88E5" stroke-width="2"/>
                              </svg>
                            </button>
                  
                          </div>
                
                          <div class="canvas-scroll-container" style="position: relative;">
                            <canvas id="canvas"></canvas>
                           
                          </div>
                        </div>
                    </div>

        <!-- Right Sidebar -->
        <div class="sidebar right" id="right-sidebar">
            <h3>Exercises / Results</h3>
            <ul>
                <table border="1" style="width: 100%; border-collapse: collapse; text-align: center;">
    <thead>
        <tr>
            <th>Readings</th>
            <th>Measure of Angle ABD</th>
            <th>Corresponding Angle ACF</th>
            <th>Remarks</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td><input type="text" placeholder="Enter angle ABD" style="width: 90%;"></td>
            <td><input type="text" placeholder="Enter angle ACF" style="width: 90%;"></td>
            <td><input type="text" placeholder="Enter remarks" style="width: 90%;"></td>
        </tr>
        <tr>
            <td>2</td>
            <td><input type="text" placeholder="Enter angle ABD" style="width: 90%;"></td>
            <td><input type="text" placeholder="Enter angle ACF" style="width: 90%;"></td>
            <td><input type="text" placeholder="Enter remarks" style="width: 90%;"></td>
        </tr>
    </tbody>
</table>

            </ul>
        </div>
    </div>
    <footer>
        <p></p>
    </footer>
     <script type="module" src="./shapes.js"></script>
  <script type="module" src="./shapes/CanvasManager.js"></script>
   <script type="module" src="./js/trianglePropertiesPage.js"></script>

 <script type="module">
    const html = await fetch('./header.html').then(res => res.text());
    document.getElementById('header-placeholder').innerHTML = html;

    const { updatePageTitle,loadSubHeaderIcons } = await import('./js/header.js');
    updatePageTitle();
    loadSubHeaderIcons();

    const { switchFunctionality, attachNavBarListeners } = await import('./js/trianglePropeventHandlers.js');
    attachNavBarListeners();
    switchFunctionality('sineTheta'); // Default functionality
  </script>



</body>
</html>
